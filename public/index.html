<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roblox AI Dev</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --bg: #0e0f14; --surface: #16181f; --surface2: #1e2029;
        --border: #2a2d3a; --accent: #6c63ff; --accent-dim: #4e47cc;
        --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; --text: #e2e4f0; --muted: #8b8fa8;
      }
      body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }

      header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
      .logo { width: 34px; height: 34px; background: var(--accent); border-radius: 9px; display: grid; place-items: center; font-size: 17px; flex-shrink: 0; }
      header h1 { font-size: 1rem; font-weight: 700; }
      header p { font-size: 0.7rem; color: var(--muted); margin-top: 1px; }

      main { flex: 1; display: flex; flex-direction: column; max-width: 680px; width: 100%; margin: 0 auto; padding: 14px; gap: 10px; }

      /* chat */
      #chat { display: flex; flex-direction: column; gap: 8px; min-height: 40px; }
      .msg { max-width: 86%; padding: 10px 13px; border-radius: 13px; font-size: 0.88rem; line-height: 1.5; animation: pop .2s ease; }
      @keyframes pop { from { opacity:0; transform:translateY(5px) } to { opacity:1; transform:translateY(0) } }
      .msg.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 3px; }
      .msg.ai { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-bottom-left-radius: 3px; }
      .msg.ai .lbl { font-size: 0.65rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
      .msg.sys { align-self: center; background: none; color: var(--muted); font-size: 0.72rem; font-style: italic; padding: 3px 0; }
      .msg.err { align-self: flex-start; background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); border-bottom-left-radius: 3px; }
      .msg.ok { align-self: flex-start; background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.3); color: var(--green); border-bottom-left-radius: 3px; }

      .typing { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 13px; border-bottom-left-radius: 3px; padding: 11px 15px; display: flex; gap: 4px; align-items: center; }
      .typing span { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: b .9s infinite; }
      .typing span:nth-child(2) { animation-delay: .15s; }
      .typing span:nth-child(3) { animation-delay: .3s; }
      @keyframes b { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }

      /* steps */
      #steps { display: none; flex-direction: column; gap: 6px; }
      #steps.show { display: flex; }
      .step { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: var(--muted); transition: color .3s; }
      .step.active { color: var(--text); }
      .step.done { color: var(--green); }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background .3s; }
      .step.active .dot { background: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,.2); }
      .step.done .dot { background: var(--green); }

      /* code */
      #codeCard { display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
      #codeCard.show { display: block; }
      .ch { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
      .ch span { font-size: 0.7rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
      #copyBtn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 0.72rem; font-weight: 600; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
      pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; overflow-x: auto; font-size: 0.78rem; line-height: 1.55; white-space: pre-wrap; word-break: break-all; max-height: 320px; overflow-y: auto; }
      code { font-family: 'Fira Code', monospace; color: #c5c8e0; }

      /* input */
      .icard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 9px; position: sticky; bottom: 14px; }
      textarea { width: 100%; min-height: 72px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 0.9rem; line-height: 1.5; padding: 10px 12px; resize: vertical; outline: none; transition: border-color .2s; font-family: inherit; }
      textarea:focus { border-color: var(--accent); }
      textarea::placeholder { color: var(--muted); }
      .brow { display: flex; gap: 7px; }
      .btn { flex: 1; padding: 11px 8px; font-size: 0.85rem; font-weight: 700; border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: background .15s, transform .1s; -webkit-tap-highlight-color: transparent; }
      .btn:active { transform: scale(.96); }
      .btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
      #askBtn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); flex: 0 0 auto; padding: 11px 14px; }
      #genBtn { background: var(--accent); color: #fff; }
      #genBtn:disabled { background: var(--accent-dim); }
      #checkBtn { background: rgba(245,158,11,.15); border: 1px solid rgba(245,158,11,.4); color: var(--yellow); flex: 0 0 auto; padding: 11px 14px; font-size: 0.8rem; }
      #checkBtn:disabled { opacity: .4; }
      .spin { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; display: none; }
      .spinning .spin { display: block; }
      @keyframes sp { to { transform: rotate(360deg); } }

      footer { text-align: center; padding: 12px; font-size: 0.68rem; color: var(--muted); }
    </style>
  </head>
  <body>
  <header>
    <div class="logo">🎮</div>
    <div>
      <h1>Roblox AI Dev</h1>
      <p>NVIDIA Nemotron · Open Cloud · Live publish</p>
    </div>
  </header>

  <main>
    <div id="chat">
      <div class="msg sys">Chat with the AI first, or go straight to Generate &amp; Publish.</div>
    </div>

    <div id="steps">
      <div class="step" id="s1"><div class="dot"></div>Fetching existing code…</div>
      <div class="step" id="s2"><div class="dot"></div>Generating Luau with Nemotron…</div>
      <div class="step" id="s3"><div class="dot"></div>Saving to database…</div>
      <div class="step" id="s4"><div class="dot"></div>Publishing to Roblox…</div>
    </div>

    <div id="codeCard">
      <div class="ch"><span>Generated Luau Script</span><button id="copyBtn" onclick="copyCode()">Copy</button></div>
      <pre><code id="codeOut"></code></pre>
    </div>

    <div class="icard">
      <textarea id="prompt" placeholder="e.g. Add a spinning part that plays a sound when touched…"></textarea>
      <div class="brow">
        <button class="btn" id="askBtn" onclick="ask()">💬 Ask</button>
        <button class="btn" id="checkBtn" onclick="aiCheck()">🤖 AI Check</button>
        <button class="btn" id="genBtn" onclick="generate()">
          <div class="spin"></div>
          <span id="genTxt">Generate &amp; Publish</span>
        </button>
      </div>
    </div>
  </main>

  <footer>Experience 10201536579 · Place 109348910187641 · <a href="/debug" style="color:var(--accent);text-decoration:none">debug</a></footer>

  <script>
    let token = '', code = '', history = [];

    async function init() {
      try {
        token = (await (await fetch('/api/token')).json()).token || '';
        if (token) {
          const r = await fetch('/api/code', { headers: { 'x-app-token': token } });
          const d = await r.json();
          if (d.code) showCode(d.code);
        }
      } catch (_) {}
    }

    function bubble(role, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      if (role === 'ai') el.innerHTML = '<div class="lbl">🤖 Nemotron</div>' + esc(text);
      else if (role === 'err') el.innerHTML = '<div class="lbl">⚠️ Error</div>' + esc(text);
      else if (role === 'ok') el.innerHTML = '<div class="lbl">✅ Done</div>' + esc(text);
      else el.textContent = text;
      document.getElementById('chat').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function typing() {
      const el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      document.getElementById('chat').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      return el;
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

    async function ask() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { shake(); return; }
      bubble('user', prompt);
      history.push({ role: 'user', content: prompt });
      document.getElementById('prompt').value = '';

      const btn = document.getElementById('askBtn');
      btn.disabled = true;
      const t = typing();
      try {
        const r = await fetch('/api/discuss', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-app-token': token },
          body: JSON.stringify({ messages: history }),
        });
        const d = await r.json();
        t.remove();
        const reply = d.reply || d.error || 'Something went wrong.';
        bubble(d.reply ? 'ai' : 'err', reply);
        if (d.reply) history.push({ role: 'assistant', content: d.reply });
      } catch (e) { t.remove(); bubble('err', e.message); }
      finally { btn.disabled = false; }
    }

    // AI Check — asks AI to review + fix the current code and republish
    async function aiCheck() {
      const btn = document.getElementById('checkBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Checking…';
      const t = typing();
      try {
        const r = await fetch('/api/ai-check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-app-token': token },
        });
        const d = await r.json();
        t.remove();
        if (!r.ok) {
          bubble('err', d.error || 'AI check failed.');
          return;
        }
        bubble('ok', 'AI reviewed your code, fixed any issues, and republished. Ground is guaranteed — players won\'t fall!');
        showCode(d.code);
      } catch (e) { t.remove(); bubble('err', e.message); }
      finally { btn.disabled = false; btn.textContent = '🤖 AI Check'; }
    }

    function step(n, s) { document.getElementById('s'+n).className = 'step '+s; }

    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) { shake(); return; }
      bubble('user', prompt);
      document.getElementById('prompt').value = '';

      const btn = document.getElementById('genBtn');
      btn.disabled = true; btn.classList.add('spinning');
      document.getElementById('genTxt').textContent = 'Working…';
      document.getElementById('steps').classList.add('show');
      [1,2,3,4].forEach(n => step(n,''));
      step(1,'active');
      document.getElementById('codeCard').classList.remove('show');

      try {
        step(1,'done'); step(2,'active');
        const r = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-app-token': token },
          body: JSON.stringify({ prompt, messages: history }),
        });
        step(2,'done'); step(3,'active');
        const d = await r.json();
        if (!r.ok) {
          step(3,'done'); step(4,'done');
          bubble('err', d.error || 'Failed.');
          if (d.code) showCode(d.code);
          return;
        }
        step(3,'done'); step(4,'active');
        await new Promise(x => setTimeout(x, 300));
        step(4,'done');
        bubble('ai', '✅ Published to Roblox! Your game is live.');
        history.push({ role: 'assistant', content: 'Published the script successfully.' });
        showCode(d.code);
      } catch (e) {
        bubble('err', e.message);
      } finally {
        btn.disabled = false; btn.classList.remove('spinning');
        document.getElementById('genTxt').textContent = 'Generate & Publish';
      }
    }

    function showCode(c) {
      code = c;
      document.getElementById('codeOut').textContent = c;
      document.getElementById('codeCard').classList.add('show');
    }

    async function copyCode() {
      await navigator.clipboard.writeText(code);
      const b = document.getElementById('copyBtn');
      b.textContent = 'Copied!';
      setTimeout(() => b.textContent = 'Copy', 1800);
    }

    function shake() {
      const el = document.getElementById('prompt');
      el.style.outline = '2px solid #ef4444';
      setTimeout(() => el.style.outline = '', 1200);
    }

    document.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') generate(); });
    init();
  </script>
  </body>
  </html>
